name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          VERSION=$(git describe --tags 2>/dev/null || echo dev)
          CGO_ENABLED=0 go build -ldflags="-s -w -X github.com/flyingobsidian/gcloud-go/cmd.Version=$VERSION" -o bin/gcloud-go .

      - name: Unit tests
        run: go test ./...
