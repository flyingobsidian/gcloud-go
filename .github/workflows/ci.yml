name: CI

on:
  push:
    branches: [main]
    tags: ['[0-9]*']
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      sh: ${{ steps.filter.outputs.sh }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - 'cmd/**/*.go'
              - 'internal/**/*.go'
            sh:
              - '**/*.sh'

  test:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

  shellcheck:
    name: ShellCheck
    needs: changes
    if: needs.changes.outputs.sh == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck
        run: shellcheck $(git ls-files '*.sh')

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} make build
          mv bin/gcloud-go bin/gcloud-go-${{ matrix.goos }}-${{ matrix.goarch }}

      - uses: actions/upload-artifact@v7
        with:
          name: gcloud-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/gcloud-go-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: bin
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            bin/gcloud-go-linux-amd64 \
            bin/gcloud-go-linux-arm64 \
            bin/gcloud-go-darwin-amd64 \
            bin/gcloud-go-darwin-arm64
